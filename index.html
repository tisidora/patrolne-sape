<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prvi rođendan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #f8f5f2;
    color: #4a4a4a;
    text-align: center;
}

/* HERO */
.hero {
    padding: 40px 20px;
    animation: fadeIn 1.5s ease;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 16px;
    letter-spacing: 1px;
}

/* IMAGE */
.image-box {
    width: 80%;
    max-width: 300px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    animation: fadeIn 2s ease;
}

.image-box img {
    width: 100%;
    display: block;
}

/* DETAILS */
.details {
    margin-top: 30px;
    animation: fadeUp 2s ease;
}

.details h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
}

.details p {
    margin: 5px 0;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 25px;
    background: #d8cfc4;
    color: #fff;
    text-decoration: none;
    border-radius: 25px;
    transition: 0.3s;
}

.btn:hover {
    background: #c4b8aa;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="hero">
    <h1>Naš mali Luka puni 1 🎂</h1>
    <p>Pridružite nam se u proslavi</p>
</div>

<div class="image-box">
    <img src="https://via.placeholder.com/300" alt="Beba">
</div>

<div class="details">
    <h2>Detalji</h2>
    <p>📅 15. maj 2026.</p>
    <p>⏰ 17:00h</p>
    <p>📍 Restoran Garden</p>

    <a href="#" class="btn">Potvrdi dolazak</a>
</div>

</body>
</html>

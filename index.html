<div class="team-container">
    <h3 style="color: #1a73e8;">Твоја омиљена екипа те чека:</h3>
    <div class="character-grid">
        
        <div class="character-card chase">
            <img src="https://img.icons8.com/color/96/german-shepherd.png" alt="Chase">
            <p>Чејс је спреман за акцију!</p>
        </div>

        <div class="character-card marshall">
            <img src="https://img.icons8.com/color/96/dalmatian.png" alt="Marshall">
            <p>Маршал је на задатку!</p>
        </div>

        <div class="character-card skye">
            <img src="https://img.icons8.com/color/96/cockapoo.png" alt="Skye">
            <p>Идемо у висине!</p>
        </div>

    </div>
</div>

<style>
    /* Стилизација мреже за ликове */
    .team-container {
        padding: 20px;
        background-color: #ffffff;
        border-radius: 20px;
        margin: 20px auto;
        max-width: 800px;
    }

    .character-grid {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .character-card {
        padding: 15px;
        border-radius: 15px;
        width: 150px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border: 3px solid transparent;
    }

    /* Анимација на ховер (интеракција) */
    .character-card:hover {
        transform: translateY(-10px) scale(1.05);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    /* Појединачне боје за сваког куцу */
    .chase { border-color: #1a73e8; background-color: #e8f0fe; }
    .marshall { border-color: #e21b22; background-color: #fdeaea; }
    .skye { border-color: #f06292; background-color: #fce4ec; }

    .character-card img {
        width: 80px;
        height: auto;
    }

    .character-card p {
        font-size: 0.9rem;
        font-weight: bold;
        margin-top: 10px;
    }
</style>
